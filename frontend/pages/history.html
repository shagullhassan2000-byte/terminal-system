</head>
<body>

   <div class="nav-brand">🚖 تێرمینال</div>
  <div class="nav-links">

    <a href="history.html">📋 مێژوو</a>
    <a href="drivers.html">🚗 شۆفێرەکان</a>
    <a href="passenger-search.html">🔎گەڕان بەدووای گەشتیاران</a>
    <a href="passport-scan.html">🪪 سکانی پاسپۆرت</a>
    <a href="reports.html" data-admin>📊 ڕاپۆرت</a>
    <a href="driver-report.html" data-admin>📁ڕاپۆرتی شۆفێران</a>
    <a href="users.html" data-admin>👥 بەکارهێنەران</a>
    <a href="backup.html" data-admin>💾 باکئەپ</a>

  </div>

  <div class="nav-right">
    <span id="nav-user"></span>

</nav>

<div class="container">
    <div class="page-header">
        <h1>📋 مێژووی ڕۆیشتنەکان</h1>
        <p id="today-date">---</p>
    </div>

    <!-- Search bar -->
    <div class="form-card" style="padding:16px 20px;">
        <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
            <input type="text" id="search-input" placeholder="🔍 گەڕان بە ناوی شۆفێر، ڕێگە، یان جۆر..." oninput="filterHistory()" style="flex:1; min-width:200px;" />
            <input type="date" id="filter-date" onchange="filterHistory()" style="width:160px;" />
            <button class="btn btn-secondary" onclick="clearFilters()">✖ پاككردنەوە</button>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>کۆدی ڕۆیشتن</th>
                    <th>جۆر</th>
                    <th>شۆفێر</th>
                    <th>ڕێگە</th>
                    <th>گەشتیاران</th>
                    <th>دراوەکان</th>
                    <th>بەروار</th>
                    <th>کردارەکان</th>
                </tr>
            </thead>
            <tbody id="history-body">
                <tr><td colspan="8" class="table-empty">⏳ داتا بارئەکرێت...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/auth.js"></script>
<script src="../js/receipt.js"></script>
<script src="../js/history.js"></script>
